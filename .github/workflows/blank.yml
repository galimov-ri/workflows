name: Create Daily Routine Issues

on:
  schedule:
    # Запуск в 13:00 по Владивостоку (UTC+10) → 3:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  create_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create daily issues
        run: |
          export TZ="Asia/Vladivostok"
          TOMORROW=$(date -d "@$(($(date +%s) + 86400))" +'%Y-%m-%d')
          echo "Создаю задачи на: $TOMORROW"

          gh issue create \
            --title "Работа $TOMORROW" \
            --label "daily-task" \
            --body "### 9:00 - 13:00
          - [ ] Роман:
          - [ ] Дмитрий:
          - [ ] "

          gh issue create \
            --title "Планирование $TOMORROW" \
            --label "daily-task" \
            --body "### 14:45 - 15:00"

          gh issue create \
            --title "Учёба $TOMORROW" \
            --label "daily-task" \
            --body "### 15:00 - 16:30
          - [ ] Роман:
          - [ ] Дмитрий"

          gh issue create \
            --title "Игры $TOMORROW" \
            --label "daily-task" \
            --body "### 16:30 - 18:00
          - [ ] "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
