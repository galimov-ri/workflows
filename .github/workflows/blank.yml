name: Create Daily Routine Issues

on:
  schedule:
    - cron: '0 6 * * 1-5'    # 6:00 UTC = 9:00 MSK, пн-пт
  workflow_dispatch:

jobs:
  create_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure label 'daily-task' exists
        run: |
          if ! gh label list --json name --jq '.[] | select(.name == "daily-task")' | grep -q .; then
            gh label create daily-task --description "Ежедневные задачи" --color 0075ca
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create daily issues
        run: |
          TODAY=$(date +'%Y-%m-%d')
          
          # Работа (9:00-13:00)
          gh issue create \
            --title "Работа ($TODAY)" \
            --label daily-task \
            --body "### 📋 Задачи на сегодня
          - [ ] Задача 1
          - [ ] Задача 2
          - [ ] Задача 3

          ---
          **⏰ Время:** 9:00 - 13:00
          
          **📌 Отметка начала:** ⬜ Не приступил
          - [ ] Приступил в 9:00
          
          **📌 Отметка окончания:** ⬜ Не завершил
          - [ ] Завершил в 13:00"
          
          # Планирование (14:45-15:00)
          gh issue create \
            --title "Планирование ($TODAY)" \
            --label daily-task \
            --body "### 🎯 План на день
          - [ ] Что сделано за первую половину дня?
          - [ ] Какие планы на вторую половину?
          - [ ] Есть ли блокеры?

          ---
          **⏰ Время:** 14:45 - 15:00
          
          **📌 Отметка начала:** ⬜ Не приступил
          - [ ] Приступил в 14:45
          
          **📌 Отметка окончания:** ⬜ Не завершил
          - [ ] Завершил в 15:00"
          
          # Учёба (15:00-16:30)
          gh issue create \
            --title "Учёба ($TODAY)" \
            --label daily-task \
            --body "### 📚 Что учим?
          - [ ] Тема 1
          - [ ] Тема 2
          - [ ] Тема 3

          ---
          **⏰ Время:** 15:00 - 16:30
          
          **📌 Отметка начала:** ⬜ Не приступил
          - [ ] Приступил в 15:00
          
          **📌 Отметка окончания:** ⬜ Не завершил
          - [ ] Завершил в 16:30"
          
          # Игры (16:30-18:00)
          gh issue create \
            --title "Игры ($TODAY)" \
            --label daily-task \
            --body "### 🎮 Во что играем?
          - [ ] Игра 1
          - [ ] Игра 2

          ---
          **⏰ Время:** 16:30 - 18:00
          
          **📌 Отметка начала:** ⬜ Не приступил
          - [ ] Приступил в 16:30
          
          **📌 Отметка окончания:** ⬜ Не завершил
          - [ ] Завершил в 18:00"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
