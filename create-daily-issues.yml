name: Create Daily Routine Issues

on:
  schedule:
    # Запуск в 13:00 по Владивостоку (UTC+10) = 3:00 UTC
    - cron: '0 3 * * *'
  # Для ручного запуска (на случай, если нужно протестировать)
  workflow_dispatch:

jobs:
  create_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create daily issues
        run: |
          # Явно указываем часовой пояс Владивосток (UTC+10)
          export TZ="Asia/Vladivostok"
          
          # Получаем дату следующего дня (завтра) во владивостокском времени
          TOMORROW=$(date -d "@$(($(date +%s) + 86400))" +'%Y-%m-%d')
          
          echo "Создаю задачи на: $TOMORROW"

          # Создаём задачу "Работа"
          gh issue create \
            --title "Работа $TOMORROW" \
            --label "daily-task" \
            --body "### 9:00 - 13:00
          - [ ] Роман:
          - [ ] Дмитрий:
          - [ ] "

          # Создаём задачу "Планирование"
          gh issue create \
            --title "Планирование $TOMORROW" \
            --label "daily-task" \
            --body "### 14:45 - 15:00"

          # Создаём задачу "Учёба"
          gh issue create \
            --title "Учёба $TOMORROW" \
            --label "daily-task" \
            --body "### 15:00 - 16:30
          - [ ] Роман:
          - [ ] Дмитрий"

          # Создаём задачу "Игры"
          gh issue create \
            --title "Игры $TOMORROW" \
            --label "daily-task" \
            --body "### 16:30 - 18:00
          - [ ] "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
