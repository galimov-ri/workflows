name: Create Daily Routine Issues

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  create_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create daily issues
        run: |
          # Явно задаём часовой пояс и вычисляем завтрашнюю дату
          TOMORROW=$(TZ="Asia/Vladivostok" date -d "tomorrow" +'%Y-%m-%d')
          
          # Дополнительная отладка – выводим в лог, какая дата получена
          echo "Создаю задачи на: $TOMORROW"
          echo "Текущее время в UTC: $(date -u)"
          echo "Текущее время во Владивостоке: $(TZ=Asia/Vladivostok date)"

          gh issue create \
            --title "Работа $TOMORROW" \
            --label "daily-task" \
            --body "### 9:00 - 13:00
          - [ ] Роман:
          - [ ] Дмитрий:
          - [ ] "

          gh issue create \
            --title "Планирование $TOMORROW" \
            --label "daily-task" \
            --body "### 14:45 - 15:00"

          gh issue create \
            --title "Учёба $TOMORROW" \
            --label "daily-task" \
            --body "### 15:00 - 16:30
          - [ ] Роман:
          - [ ] Дмитрий"

          gh issue create \
            --title "Игры $TOMORROW" \
            --label "daily-task" \
            --body "### 16:30 - 18:00
          - [ ] "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
