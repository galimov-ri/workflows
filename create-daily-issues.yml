name: Create Daily Routine Issues

on:
  schedule:
    # Запуск в 13:00 каждый день
    - cron: '0 13 * * *'
  # Для ручного запуска (на случай, если нужно протестировать)
  workflow_dispatch:

jobs:
  create_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create daily issues
        run: |
          # Получаем дату следующего дня (завтра)
          TOMORROW=$(date -d "+1 day" +'%Y-%m-%d')

          # Создаём задачу "Работа"
          gh issue create \
            --title "Работа ($TOMORROW)" \
            --label "daily-task" \
            --body "### 9:00 - 13:00
          - [ ] Роман:
          - [ ] Дмитрий:
          - [ ] "

          # Создаём задачу "Планирование"
          gh issue create \
            --title "Планирование ($TOMORROW)" \
            --label "daily-task" \
            --body "### 14:45 - 15:00"

          # Создаём задачу "Учёба"
          gh issue create \
            --title "Учёба ($TOMORROW)" \
            --label "daily-task" \
            --body "### 15:00 - 16:30
          - [ ] Роман:
          - [ ] Дмитрий"

          # Создаём задачу "Игры"
          gh issue create \
            --title "Игры ($TOMORROW)" \
            --label "daily-task" \
            --body "### 16:30 - 18:00
          - [ ] "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
